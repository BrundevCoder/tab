<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>New Tab</title>
</head>
<body>

  <div class="background"></div>

  <main>

    <div class="clock-container">
      <span id="time">00:00:00</span>
    </div>

    <div class="main-container">

      <form class="form-search" action="https://google.com/search?">
        <input class="search-ipt" name="q" type="text" placeholder="Search for something...">
        <button class="btn">Search</button>
      </form>

    </div>

    <div class="jokes-container">
      <p class="title">Random Joke:</p>
      <p id="jokeMessage"></p>
      <button id="reroll-joke-btn" class="joke-btn">Another</button>
    </div>

  </main>
  
  <script src="script.js"></script>
</body>
</html>
